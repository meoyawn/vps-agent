---
- name: Update Cursor agent on cursor hosts
  hosts: vps
  become: true
  gather_facts: false
  tasks:
    - name: Discover installed Cursor agent binary
      ansible.builtin.shell: |
        set -euo pipefail
        export HOME="{{ cursor_home }}"
        export PATH="{{ cursor_path }}"
        if command -v agent >/dev/null 2>&1; then
          command -v agent
        else
          command -v cursor-agent
        fi
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ cursor_user }}"
      environment:
        HOME: "{{ cursor_home }}"
        PATH: "{{ cursor_path }}"
      register: cursor_binary
      changed_when: false

    - name: Capture current Cursor agent version
      ansible.builtin.command:
        argv:
          - "{{ cursor_binary.stdout }}"
          - --version
      become: true
      become_user: "{{ cursor_user }}"
      environment:
        HOME: "{{ cursor_home }}"
        PATH: "{{ cursor_path }}"
      register: cursor_version_before
      changed_when: false

    - name: Capture current Cursor agent binary path
      ansible.builtin.command:
        argv:
          - readlink
          - -f
          - "{{ cursor_binary.stdout }}"
      register: cursor_binary_path_before
      changed_when: false

    - name: Update Cursor agent to the latest available version
      ansible.builtin.command:
        argv:
          - "{{ cursor_binary.stdout }}"
          - update
      become: true
      become_user: "{{ cursor_user }}"
      environment:
        HOME: "{{ cursor_home }}"
        PATH: "{{ cursor_path }}"
      register: cursor_update
      changed_when: false

    - name: Capture effective Cursor agent version after update
      ansible.builtin.command:
        argv:
          - "{{ cursor_binary.stdout }}"
          - --version
      become: true
      become_user: "{{ cursor_user }}"
      environment:
        HOME: "{{ cursor_home }}"
        PATH: "{{ cursor_path }}"
      register: cursor_version_after
      changed_when: false

    - name: Capture effective Cursor agent binary path after update
      ansible.builtin.command:
        argv:
          - readlink
          - -f
          - "{{ cursor_binary.stdout }}"
      register: cursor_binary_path_after
      changed_when: false

    - name: Assert Cursor agent resolves to a versioned install path
      ansible.builtin.assert:
        that:
          - (cursor_binary_path_after.stdout | trim) is match(".*/cursor-agent/versions/.+/cursor-agent$")
        fail_msg: >-
          expected Cursor agent to resolve to a versioned install path, got
          {{ cursor_binary_path_after.stdout | trim }}
