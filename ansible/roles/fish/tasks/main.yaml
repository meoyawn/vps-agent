- name: Install fish package
  ansible.builtin.apt:
    name: fish
    state: present

- name: Ensure agent user login shell is fish
  ansible.builtin.user:
    name: "{{ agent_user }}"
    shell: "{{ agent_shell }}"

- name: Ensure fish config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ agent_user }}"
    group: "{{ agent_group }}"
    mode: "0755"
  loop:
    - "{{ agent_home }}/.config"
    - "{{ agent_fish_config_dir }}"
    - "{{ agent_fish_config_dir }}/conf.d"
    - "{{ agent_fish_config_dir }}/completions"

- name: Sync controller fish config
  ansible.posix.synchronize:
    src: "{{ ansible_controller_fish_config_dir }}/"
    dest: "{{ agent_fish_config_dir }}/"
    archive: true
    owner: false
    group: false
    perms: false
    rsync_opts:
      - --exclude=.git/
      - --exclude=conf.d/agent_env.fish

- name: Ensure synced fish config is owned by agent
  ansible.builtin.file:
    path: "{{ agent_fish_config_dir }}"
    state: directory
    owner: "{{ agent_user }}"
    group: "{{ agent_group }}"
    recurse: true

- name: Install fish environment config
  ansible.builtin.template:
    src: conf.d/agent_env.fish.j2
    dest: "{{ agent_fish_env_config_path }}"
    owner: "{{ agent_user }}"
    group: "{{ agent_group }}"
    mode: "0644"
