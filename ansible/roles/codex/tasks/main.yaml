- name: Ensure Codex directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ agent_user }}"
    group: "{{ agent_group }}"
    mode: "0755"
  loop:
    - "{{ agent_codex_dir }}"
    - "{{ agent_codex_skills_dir }}"
    - "{{ agent_codex_plugins_dir }}"

- name: Ensure Codex config exists
  ansible.builtin.file:
    path: "{{ agent_codex_config_path }}"
    state: touch
    owner: "{{ agent_user }}"
    group: "{{ agent_group }}"
    mode: "0644"
    modification_time: preserve
    access_time: preserve

- name: Manage Codex caveman plugin config
  ansible.builtin.blockinfile:
    path: "{{ agent_codex_config_path }}"
    marker: "# {mark} ANSIBLE MANAGED CAVEMAN PLUGIN"
    block: "{{ agent_codex_caveman_config_block }}"

- name: Manage Codex local plugin config
  ansible.builtin.blockinfile:
    path: "{{ agent_codex_config_path }}"
    marker: "# {mark} ANSIBLE MANAGED LOCAL PLUGINS"
    block: "{{ agent_codex_local_plugins_config_block }}"

- name: Sync controller Codex skills
  ansible.posix.synchronize:
    src: "{{ ansible_controller_codex_skills_dir }}/"
    dest: "{{ agent_codex_skills_dir }}/"
    archive: true
    owner: false
    group: false
    perms: false

- name: Sync controller Codex plugins
  ansible.posix.synchronize:
    src: "{{ ansible_controller_codex_plugins_dir }}/"
    dest: "{{ agent_codex_plugins_dir }}/"
    archive: true
    owner: false
    group: false
    perms: false
    rsync_opts:
      - --exclude=cache/
      - --exclude=.plugin-appserver/
      - --exclude=.remote-plugin-install-staging/
      - --exclude=.DS_Store

- name: Remove excluded Codex plugin cache paths
  ansible.builtin.file:
    path: "{{ agent_codex_plugins_dir }}/{{ item }}"
    state: absent
  loop:
    - cache
    - .plugin-appserver
    - .remote-plugin-install-staging
    - .DS_Store

- name: Ensure synced Codex content is owned by agent
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ agent_user }}"
    group: "{{ agent_group }}"
    recurse: true
  loop:
    - "{{ agent_codex_skills_dir }}"
    - "{{ agent_codex_plugins_dir }}"

- name: Install Codex hooks
  ansible.builtin.copy:
    src: hooks.json
    dest: "{{ agent_codex_dir }}/hooks.json"
    owner: "{{ agent_user }}"
    group: "{{ agent_group }}"
    mode: "0644"
