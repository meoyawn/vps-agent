- name: Update apt packages and agent user tools
  hosts: vps
  become: true
  gather_facts: false
  tasks:
    - name: Update apt package indexes and upgrade installed packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true
        autoclean: true
        cache_valid_time: 3600

    - name: Update Bun for agent user
      ansible.builtin.command:
        argv:
          - "{{ agent_bun_binary_path }}"
          - upgrade
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
        PATH: "{{ agent_path }}"
      changed_when: false

    - name: Update uv for agent user
      ansible.builtin.command:
        argv:
          - "{{ agent_uv_binary_path }}"
          - self
          - update
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
        PATH: "{{ agent_path }}"
      changed_when: false
      failed_when: false

    - name: Update Codex for agent user
      ansible.builtin.command:
        argv:
          - "{{ agent_codex_binary_name }}"
          - update
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
        PATH: "{{ agent_path }}"
      changed_when: false
      failed_when: false

    - name: Update mise for agent user
      ansible.builtin.command:
        argv:
          - "{{ agent_mise_binary_path }}"
          - self-update
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
        PATH: "{{ agent_path }}"
      changed_when: false
      failed_when: false
