- name: Configure self-hosted agent VPS
  hosts: vps
  become: true
  gather_facts: true
  handlers:
    - name: Reload ufw if active
      ansible.builtin.shell: |
        set -euo pipefail
        if ufw status | grep -q "^Status: active$"; then
          ufw --force reload
        fi
      args:
        executable: /bin/bash
      changed_when: false

  tasks:
    - name: Assert CPU architecture is supported
      ansible.builtin.assert:
        that:
          - agent_detected_arch in agent_arch_map
        fail_msg: >-
          unsupported CPU architecture {{ agent_detected_arch | default('unknown') }};
          supported architectures are {{ agent_arch_map.keys() | list | join(', ') }}

    - name: Apply host-level provisioning as root
      block:
        - name: Install base packages
          ansible.builtin.apt:
            name: "{{ agent_packages }}"
            state: present

        - name: Uninstall conflicting system packages
          ansible.builtin.apt:
            name: "{{ uninstall_packages }}"
            state: absent

        - name: Create agent group explicitly for deterministic provisioning across distros
          ansible.builtin.group:
            name: "{{ agent_group }}"
            state: present

        - name: Create agent user
          ansible.builtin.user:
            name: "{{ agent_user }}"
            group: "{{ agent_group }}"
            create_home: true
            state: present

        - name: Allow agent user to run Docker
          ansible.builtin.user:
            name: "{{ agent_user }}"
            groups:
              - docker
            append: true

        - name: Install docker-compose compatibility command
          ansible.builtin.file:
            src: "{{ agent_docker_compose_binary_path }}"
            dest: "{{ agent_docker_compose_compat_path }}"
            state: link
            force: true

        - name: Ensure agent home exists
          ansible.builtin.file:
            path: "{{ agent_home }}"
            state: directory
            owner: "{{ agent_user }}"
            group: "{{ agent_group }}"
            mode: "0755"

        - name: Ensure agent workspace root exists
          ansible.builtin.file:
            path: "{{ agent_workspace_root }}"
            state: directory
            owner: "{{ agent_user }}"
            group: "{{ agent_group }}"
            mode: "0755"

        - name: Ensure agent SSH directory exists
          ansible.builtin.file:
            path: "{{ agent_ssh_dir }}"
            state: directory
            owner: "{{ agent_user }}"
            group: "{{ agent_group }}"
            mode: "0700"

        - name: Sync controller SSH keys
          ansible.posix.synchronize:
            src: "{{ ansible_controller_ssh_dir }}/"
            dest: "{{ agent_ssh_dir }}/"
            archive: true
            owner: false
            group: false
            perms: false
            rsync_opts:
              - --include=id_*
              - --include=*.pub
              - --exclude=config
              - --exclude=known_hosts*
              - --exclude=authorized_keys
              - --exclude=*

        - name: Find synced SSH key files
          ansible.builtin.find:
            paths: "{{ agent_ssh_dir }}"
            patterns:
              - id_*
              - "*.pub"
            file_type: file
          register: agent_synced_ssh_key_files

        - name: Ensure synced SSH keys are owned by agent
          ansible.builtin.file:
            path: "{{ item.path }}"
            owner: "{{ agent_user }}"
            group: "{{ agent_group }}"
            mode: "{{ '0644' if item.path.endswith('.pub') else '0600' }}"
          loop: "{{ agent_synced_ssh_key_files.files }}"

        - name: Find synced SSH public keys
          ansible.builtin.find:
            paths: "{{ agent_ssh_dir }}"
            patterns: "*.pub"
            file_type: file
          register: agent_synced_ssh_public_keys

        - name: Assert at least one SSH public key is available
          ansible.builtin.assert:
            that:
              - agent_synced_ssh_public_keys.matched > 0
            fail_msg: "expected at least one public key copied from {{ ansible_controller_ssh_dir }}"

        - name: Read synced SSH public keys
          ansible.builtin.slurp:
            src: "{{ item.path }}"
          loop: "{{ agent_synced_ssh_public_keys.files | sort(attribute='path') }}"
          register: agent_synced_ssh_public_key_contents

        - name: Build authorized keys from synced public keys
          ansible.builtin.set_fact:
            agent_authorized_keys_content: >-
              {{ agent_synced_ssh_public_key_contents.results
                | map(attribute='content')
                | map('b64decode')
                | map('trim')
                | reject('equalto', '')
                | unique
                | join('\n') ~ '\n' }}

        - name: Generate authorized keys from synced public keys
          ansible.builtin.copy:
            dest: "{{ agent_authorized_keys_path }}"
            owner: "{{ agent_user }}"
            group: "{{ agent_group }}"
            mode: "0600"
            content: "{{ agent_authorized_keys_content }}"

        - name: Allow unconfined user namespaces for Codex sandbox on Ubuntu 24.04
          ansible.builtin.copy:
            dest: /etc/sysctl.d/60-codex-userns.conf
            mode: "0644"
            content: |
              kernel.apparmor_restrict_unprivileged_unconfined = 0
              kernel.apparmor_restrict_unprivileged_userns = 0
          register: codex_userns_sysctl

        - name: Reload sysctl after Codex user namespace changes
          ansible.builtin.command:
            argv:
              - sysctl
              - --system
          when: codex_userns_sysctl.changed

        - name: Install scc
          ansible.builtin.shell: |
            set -euo pipefail
            tmp_dir="$(mktemp -d)"
            trap 'rm -rf "$tmp_dir"' EXIT
            curl -fsSL "{{ agent_scc_download_url }}" -o "$tmp_dir/scc.tar.gz"
            tar -xzf "$tmp_dir/scc.tar.gz" -C "$tmp_dir"
            install -m 0755 "$tmp_dir/scc" /usr/local/bin/scc
          args:
            executable: /bin/bash
            creates: /usr/local/bin/scc

    - name: Apply firewall policy
      block:
        - name: Install UFW
          ansible.builtin.apt:
            name: ufw
            state: present

        - name: Deny incoming traffic by default
          ansible.builtin.lineinfile:
            path: /etc/default/ufw
            regexp: "^DEFAULT_INPUT_POLICY="
            line: 'DEFAULT_INPUT_POLICY="DROP"'
          notify: Reload ufw if active

        - name: Allow outgoing traffic by default
          ansible.builtin.lineinfile:
            path: /etc/default/ufw
            regexp: "^DEFAULT_OUTPUT_POLICY="
            line: 'DEFAULT_OUTPUT_POLICY="ACCEPT"'
          notify: Reload ufw if active

        - name: Check ufw status before rule changes
          ansible.builtin.command: ufw status
          register: ufw_status_before_rules
          changed_when: false

        - name: Allow SSH through ufw
          ansible.builtin.command:
            argv:
              - ufw
              - allow
              - 22/tcp
              - comment
              - SSH
          when: "'22/tcp' not in ufw_status_before_rules.stdout"
          changed_when: true
          notify: Reload ufw if active

        - name: Allow Mosh UDP through ufw
          ansible.builtin.command:
            argv:
              - ufw
              - allow
              - 60000:61000/udp
              - comment
              - Mosh
          when: "'60000:61000/udp' not in ufw_status_before_rules.stdout"
          changed_when: true
          notify: Reload ufw if active

        - name: Check ufw status before enabling
          ansible.builtin.command: ufw status
          register: ufw_status_before_enable
          changed_when: false

        - name: Enable ufw
          ansible.builtin.command: ufw --force enable
          register: ufw_enable
          changed_when: ufw_enable.rc == 0
          when: "'Status: active' not in ufw_status_before_enable.stdout"

    - name: Apply sshd hardening
      ansible.builtin.import_role:
        name: sshd

    - name: Apply terminal compatibility
      ansible.builtin.import_role:
        name: terminal

    - name: Apply tmux configuration
      ansible.builtin.import_role:
        name: tmux

    - name: Apply fish configuration
      ansible.builtin.import_role:
        name: fish

    - name: Apply Codex configuration
      ansible.builtin.import_role:
        name: codex

    - name: Apply agent-scoped tooling as agent
      become: true
      become_user: "{{ agent_user }}"
      block:
        - name: Install Bun for agent user
          ansible.builtin.shell: |
            set -euo pipefail
            curl -fsSL "{{ agent_bun_install_url }}" | bash
          args:
            executable: /bin/bash
            creates: "{{ agent_bun_binary_path }}"
          environment:
            HOME: "{{ agent_home }}"

        - name: Install uv for agent user
          ansible.builtin.shell: |
            set -euo pipefail
            curl -fsSL "{{ agent_uv_install_url }}" | env UV_UNMANAGED_INSTALL="{{ agent_local_bin_dir }}" sh
          args:
            executable: /bin/bash
            creates: "{{ agent_uv_binary_path }}"
          environment:
            HOME: "{{ agent_home }}"

        - name: Install Task for agent user
          ansible.builtin.shell: |
            set -euo pipefail
            sh -c "$(curl -fsSL --location "{{ agent_task_install_url }}")" -- -d -b "{{ agent_local_bin_dir }}"
          args:
            executable: /bin/bash
            creates: "{{ agent_task_binary_path }}"
          environment:
            HOME: "{{ agent_home }}"

        - name: Install Codex for agent user
          ansible.builtin.shell: |
            set -euo pipefail
            if command -v "{{ agent_codex_binary_name }}" >/dev/null 2>&1; then
              echo __CODEX_UNCHANGED__
              exit 0
            fi
            curl -fsSL "{{ agent_codex_install_url }}" | CODEX_NON_INTERACTIVE=1 sh
            echo __CODEX_CHANGED__
          args:
            executable: /bin/bash
          environment:
            HOME: "{{ agent_home }}"
            PATH: "{{ agent_path }}"
          register: agent_codex_install
          changed_when: "'__CODEX_CHANGED__' in agent_codex_install.stdout_lines"

        - name: Install mise for agent user
          ansible.builtin.shell: |
            set -euo pipefail
            if command -v mise >/dev/null 2>&1; then
              echo __MISE_UNCHANGED__
              exit 0
            fi
            curl "{{ agent_mise_install_url }}" | sh
            echo __MISE_CHANGED__
          args:
            executable: /bin/bash
          environment:
            HOME: "{{ agent_home }}"
            PATH: "{{ agent_path }}"
          register: agent_mise_install
          changed_when: "'__MISE_CHANGED__' in agent_mise_install.stdout_lines"

        - name: Install Omnara for agent user
          ansible.builtin.shell: |
            set -euo pipefail
            if command -v "{{ agent_omnara_binary_name }}" >/dev/null 2>&1; then
              echo __OMNARA_UNCHANGED__
              exit 0
            fi
            curl -fsSL "{{ agent_omnara_install_url }}" | bash
            echo __OMNARA_CHANGED__
          args:
            executable: /bin/bash
          environment:
            HOME: "{{ agent_home }}"
            PATH: "{{ agent_path }}"
          register: agent_omnara_install
          changed_when: "'__OMNARA_CHANGED__' in agent_omnara_install.stdout_lines"

        - name: Ensure agent tool PATH is available in login shells
          ansible.builtin.blockinfile:
            path: "{{ agent_profile_path }}"
            create: true
            marker: "# {mark} ANSIBLE MANAGED AGENT PATH"
            block: |
              export UV_TOOL_BIN_DIR="{{ agent_local_bin_dir }}"
              export UV_TOOL_DIR="{{ agent_uv_tool_dir }}"
              export BUN_INSTALL="{{ agent_bun_install_root }}"
              export MISE_DATA_DIR="{{ agent_mise_data_dir }}"
              case ":$PATH:" in
                  *:"{{ agent_local_bin_dir }}":*) ;;
                  *) PATH="{{ agent_local_bin_dir }}:$PATH" ;;
              esac
              case ":$PATH:" in
                  *:"{{ agent_bun_bin_dir }}":*) ;;
                  *) PATH="{{ agent_bun_bin_dir }}:$PATH" ;;
              esac
              case ":$PATH:" in
                  *:"{{ agent_mise_shims_dir }}":*) ;;
                  *) PATH="{{ agent_mise_shims_dir }}:$PATH" ;;
              esac
              export PATH
