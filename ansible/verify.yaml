---
- name: Verify self-hosted Cursor agent
  hosts: vps
  become: true
  gather_facts: false
  tasks:
    - name: Verify cursor user exists
      ansible.builtin.command:
        argv:
          - id
          - -u
          - "{{ agent_user }}"
      changed_when: false

    - name: Read cursor passwd entry
      ansible.builtin.command:
        argv:
          - getent
          - passwd
          - "{{ agent_user }}"
      register: cursor_passwd_entry
      changed_when: false

    - name: Verify cursor login shell is fish
      ansible.builtin.assert:
        that:
          - cursor_passwd_entry.stdout.endswith(':' ~ agent_shell)
        fail_msg: "expected {{ agent_user }} login shell to be {{ agent_shell }}, got {{ cursor_passwd_entry.stdout }}"

    - name: Verify cursor home exists
      ansible.builtin.command:
        argv:
          - test
          - -d
          - "{{ agent_home }}"
      changed_when: false

    - name: Verify cursor workspace root exists
      ansible.builtin.command:
        argv:
          - test
          - -d
          - "{{ agent_workspace_root }}"
      changed_when: false

    - name: Verify ufw is installed
      ansible.builtin.command:
        argv:
          - ufw
          - --version
      changed_when: false

    - name: Verify mosh-server is installed
      ansible.builtin.command:
        argv:
          - mosh-server
          - --version
      changed_when: false

    - name: Verify Docker responds
      ansible.builtin.command:
        argv:
          - docker
          - --version
      changed_when: false

    - name: Verify Docker runs a minimal container as cursor
      ansible.builtin.command:
        argv:
          - docker
          - run
          - --rm
          - --network=none
          - busybox:1.37.0-uclibc
          - /bin/true
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Read ufw default incoming policy
      ansible.builtin.command:
        argv:
          - awk
          - -F=
          - /^DEFAULT_INPUT_POLICY=/{gsub(/"/, "", $2); print $2}
          - /etc/default/ufw
      register: ufw_default_input_policy
      changed_when: false

    - name: Assert ufw default incoming policy drops traffic
      ansible.builtin.assert:
        that:
          - ufw_default_input_policy.stdout == 'DROP'
        fail_msg: >-
          expected DEFAULT_INPUT_POLICY=DROP;
          got {{ ufw_default_input_policy.stdout | default('missing') }}

    - name: Read ufw default outgoing policy
      ansible.builtin.command:
        argv:
          - awk
          - -F=
          - /^DEFAULT_OUTPUT_POLICY=/{gsub(/"/, "", $2); print $2}
          - /etc/default/ufw
      register: ufw_default_output_policy
      changed_when: false

    - name: Assert ufw default outgoing policy accepts traffic
      ansible.builtin.assert:
        that:
          - ufw_default_output_policy.stdout == 'ACCEPT'
        fail_msg: >-
          expected DEFAULT_OUTPUT_POLICY=ACCEPT;
          got {{ ufw_default_output_policy.stdout | default('missing') }}

    - name: Read ufw status
      ansible.builtin.command:
        argv:
          - ufw
          - status
      register: ufw_status
      changed_when: false

    - name: Assert ufw policy is active
      ansible.builtin.assert:
        that:
          - "'Status: active' in ufw_status.stdout"
          - "'22/tcp' in ufw_status.stdout"
          - "'60000:61000/udp' in ufw_status.stdout"
        fail_msg: >-
          expected active ufw with SSH and Mosh UDP rules;
          got {{ ufw_status.stdout_lines | default([]) }}

    - name: Read AppArmor unprivileged unconfined restriction
      ansible.builtin.command:
        argv:
          - sysctl
          - -n
          - kernel.apparmor_restrict_unprivileged_unconfined
      register: apparmor_restrict_unprivileged_unconfined
      changed_when: false

    - name: Assert AppArmor unprivileged unconfined restriction disabled
      ansible.builtin.assert:
        that:
          - apparmor_restrict_unprivileged_unconfined.stdout == '0'
        fail_msg: >-
          expected kernel.apparmor_restrict_unprivileged_unconfined=0;
          got {{ apparmor_restrict_unprivileged_unconfined.stdout | default('missing') }}

    - name: Read AppArmor unprivileged user namespace restriction
      ansible.builtin.command:
        argv:
          - sysctl
          - -n
          - kernel.apparmor_restrict_unprivileged_userns
      register: apparmor_restrict_unprivileged_userns
      changed_when: false

    - name: Assert AppArmor unprivileged user namespace restriction disabled
      ansible.builtin.assert:
        that:
          - apparmor_restrict_unprivileged_userns.stdout == '0'
        fail_msg: >-
          expected kernel.apparmor_restrict_unprivileged_userns=0;
          got {{ apparmor_restrict_unprivileged_userns.stdout | default('missing') }}

    - name: Verify cursor can create user namespaces
      ansible.builtin.command:
        argv:
          - unshare
          - -Ur
          - "true"
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Probe GitHub SSH (git@github.com)
      ansible.builtin.command:
        argv:
          - ssh
          - -o
          - BatchMode=yes
          - -o
          - StrictHostKeyChecking=yes
          - -T
          - git@github.com
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      register: github_ssh_probe
      failed_when: false
      changed_when: false

    - name: Assert GitHub SSH authentication succeeded
      ansible.builtin.assert:
        that:
          - >-
            'successfully authenticated' in
            ((github_ssh_probe.stdout | default('')) ~ (github_ssh_probe.stderr | default(''))) | lower
        fail_msg: >-
          expected GitHub SSH probe to confirm authentication;
          rc={{ github_ssh_probe.rc }} stdout={{ github_ssh_probe.stdout | default('') }}
          stderr={{ github_ssh_probe.stderr | default('') }}

    - name: Stat GitHub deploy private key
      ansible.builtin.stat:
        path: "{{ agent_github_ssh_private_key_path }}"
      register: github_deploy_key_stat

    - name: Assert GitHub deploy private key permissions
      ansible.builtin.assert:
        that:
          - github_deploy_key_stat.stat.exists
          - github_deploy_key_stat.stat.isreg
          - github_deploy_key_stat.stat.mode == '0600'
          - github_deploy_key_stat.stat.pw_name == agent_user
        fail_msg: >-
          expected {{ agent_github_ssh_private_key_path }} to exist as a regular file 0600 owned by {{ agent_user }};
          got exists={{ github_deploy_key_stat.stat.exists | default(false) }}
          mode={{ github_deploy_key_stat.stat.mode | default('missing') }}
          owner={{ github_deploy_key_stat.stat.pw_name | default('missing') }}

    - name: Stat cursor authorized keys
      ansible.builtin.stat:
        path: "{{ agent_cursor_authorized_keys_path }}"
      register: cursor_authorized_keys_stat

    - name: Assert cursor authorized keys permissions
      ansible.builtin.assert:
        that:
          - cursor_authorized_keys_stat.stat.exists
          - cursor_authorized_keys_stat.stat.isreg
          - cursor_authorized_keys_stat.stat.mode == '0600'
          - cursor_authorized_keys_stat.stat.pw_name == agent_user
        fail_msg: >-
          expected {{ agent_cursor_authorized_keys_path }} to exist as a regular file 0600 owned by {{ agent_user }};
          got exists={{ cursor_authorized_keys_stat.stat.exists | default(false) }}
          mode={{ cursor_authorized_keys_stat.stat.mode | default('missing') }}
          owner={{ cursor_authorized_keys_stat.stat.pw_name | default('missing') }}

    - name: Verify controller SSH key is authorized for cursor
      ansible.builtin.lineinfile:
        path: "{{ agent_cursor_authorized_keys_path }}"
        line: "{{ lookup('file', ansible_controller_ssh_public_key_path) }}"
        state: present
      check_mode: true
      register: cursor_authorized_key_check
      failed_when: cursor_authorized_key_check.changed
      changed_when: false

    - name: Validate sshd configuration
      ansible.builtin.command:
        argv:
          - sshd
          - -t
      changed_when: false

    - name: Read effective sshd configuration
      ansible.builtin.command:
        argv:
          - sshd
          - -T
      register: sshd_effective_config
      changed_when: false

    - name: Assert sshd hardening is effective
      ansible.builtin.assert:
        that:
          - "'passwordauthentication no' in sshd_effective_config.stdout_lines"
          - "'kbdinteractiveauthentication no' in sshd_effective_config.stdout_lines"
          - "'pubkeyauthentication yes' in sshd_effective_config.stdout_lines"
          - "'authenticationmethods publickey' in sshd_effective_config.stdout_lines"
          - >-
            'permitrootlogin prohibit-password' in sshd_effective_config.stdout_lines or
            'permitrootlogin without-password' in sshd_effective_config.stdout_lines
          - "'maxauthtries 3' in sshd_effective_config.stdout_lines"
          - "'logingracetime 20' in sshd_effective_config.stdout_lines"
        fail_msg: >-
          expected sshd effective config to enforce key-only hardening;
          got {{ sshd_effective_config.stdout_lines | default([]) }}

    - name: Verify ssh.service status
      ansible.builtin.command:
        argv:
          - systemctl
          - status
          - ssh.service
          - --no-pager
      changed_when: false

    - name: Verify Ghostty terminfo is installed
      ansible.builtin.command:
        argv:
          - infocmp
          - -A
          - /usr/share/terminfo
          - -x
          - xterm-ghostty
      changed_when: false

    - name: Verify tmux wrapper is first on PATH
      ansible.builtin.command:
        argv:
          - which
          - tmux
      register: tmux_command_path
      changed_when: false

    - name: Assert tmux wrapper path
      ansible.builtin.assert:
        that:
          - tmux_command_path.stdout == '/usr/local/bin/tmux'
        fail_msg: "expected tmux wrapper at /usr/local/bin/tmux, got {{ tmux_command_path.stdout }}"

    - name: Verify tmux starts when TERM is unset
      ansible.builtin.command:
        argv:
          - script
          - -q
          - -e
          - -c
          - env -u TERM tmux -L vps-agent-term-verify new-session -s vps-agent-term-verify true
          - /dev/null
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Verify gh has no persistent login on VPS
      ansible.builtin.command:
        argv:
          - gh
          - auth
          - status
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      register: gh_auth_status
      changed_when: false
      failed_when: gh_auth_status.rc == 0

    - name: Discover installed Cursor agent binary
      ansible.builtin.shell: |
        set -euo pipefail
        export HOME="{{ agent_home }}"
        export PATH="{{ agent_path }}"
        if command -v agent >/dev/null 2>&1; then
          command -v agent
        else
          command -v cursor-agent
        fi
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
        PATH: "{{ agent_path }}"
      register: cursor_binary
      changed_when: false

    - name: Verify cursor binary responds
      ansible.builtin.command: "{{ cursor_binary.stdout }} --version"
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
        PATH: "{{ agent_path }}"
      changed_when: false

    - name: Verify Bun responds in cursor login shell
      ansible.builtin.shell: |
        set -euo pipefail
        {{ agent_shell }} -lic 'bun --version'
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: List Bun global packages for cursor user
      ansible.builtin.command:
        argv:
          - "{{ agent_bun_binary_path }}"
          - -g
          - list
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
        PATH: "{{ agent_path }}"
      register: cursor_bun_global_packages
      changed_when: false

    - name: Assert Bun global packages installed for cursor user
      ansible.builtin.assert:
        that:
          - cursor_bun_global_packages.stdout is regex('(^|\\n|\\s)' ~ (item | regex_escape) ~ '(@|\\s|$)')
        fail_msg: >-
          expected Bun global package {{ item }} in bun -g list output;
          got {{ cursor_bun_global_packages.stdout | default('') }}
      loop: "{{ agent_bun_global_packages }}"

    - name: Verify Codex responds for cursor user
      ansible.builtin.command:
        argv:
          - codex
          - --version
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
        PATH: "{{ agent_path }}"
      changed_when: false

    - name: Verify Codex is on Bun PATH in cursor fish login shell
      ansible.builtin.shell: |
        set -euo pipefail
        {{ agent_shell }} -lic '
          test (whoami) = "{{ agent_user }}"
          test (command -v bun) = "{{ agent_bun_binary_path }}"
          test (command -v codex) = "{{ agent_bun_bin_dir }}/codex"
          codex --version
          test -d "{{ agent_workspace_root }}"
        '
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Stat Codex config
      ansible.builtin.stat:
        path: "{{ agent_home }}/.codex/config.toml"
      register: codex_config_stat

    - name: Assert Codex config is managed
      ansible.builtin.assert:
        that:
          - codex_config_stat.stat.exists
          - codex_config_stat.stat.isreg
          - codex_config_stat.stat.pw_name == agent_user
          - codex_config_stat.stat.mode == '0644'
          - codex_config_stat.stat.size > 0
        fail_msg: >-
          expected {{ agent_home }}/.codex/config.toml to exist as a non-empty regular file
          0644 owned by {{ agent_user }};
          got exists={{ codex_config_stat.stat.exists | default(false) }}
          mode={{ codex_config_stat.stat.mode | default('missing') }}
          owner={{ codex_config_stat.stat.pw_name | default('missing') }}
          size={{ codex_config_stat.stat.size | default('missing') }}

    - name: Stat Codex hooks
      ansible.builtin.stat:
        path: "{{ agent_home }}/.codex/hooks.json"
      register: codex_hooks_stat

    - name: Assert Codex hooks are managed
      ansible.builtin.assert:
        that:
          - codex_hooks_stat.stat.exists
          - codex_hooks_stat.stat.isreg
          - codex_hooks_stat.stat.pw_name == agent_user
          - codex_hooks_stat.stat.mode == '0644'
          - codex_hooks_stat.stat.size > 0
        fail_msg: >-
          expected {{ agent_home }}/.codex/hooks.json to exist as a non-empty regular file
          0644 owned by {{ agent_user }};
          got exists={{ codex_hooks_stat.stat.exists | default(false) }}
          mode={{ codex_hooks_stat.stat.mode | default('missing') }}
          owner={{ codex_hooks_stat.stat.pw_name | default('missing') }}
          size={{ codex_hooks_stat.stat.size | default('missing') }}

    - name: Stat synced agent skills directory
      ansible.builtin.stat:
        path: "{{ agent_skills_dir }}"
      register: agent_skills_dir_stat

    - name: Assert synced agent skills directory is managed
      ansible.builtin.assert:
        that:
          - agent_skills_dir_stat.stat.exists
          - agent_skills_dir_stat.stat.isdir
          - agent_skills_dir_stat.stat.pw_name == agent_user
          - agent_skills_dir_stat.stat.mode == '0755'
        fail_msg: >-
          expected {{ agent_skills_dir }} to exist as a directory
          0755 owned by {{ agent_user }};
          got exists={{ agent_skills_dir_stat.stat.exists | default(false) }}
          mode={{ agent_skills_dir_stat.stat.mode | default('missing') }}
          owner={{ agent_skills_dir_stat.stat.pw_name | default('missing') }}

    - name: Find synced agent skill definitions
      ansible.builtin.find:
        paths: "{{ agent_skills_dir }}"
        patterns: SKILL.md
        recurse: true
        file_type: file
      register: agent_skill_definitions

    - name: Assert synced agent skills contain skill definitions
      ansible.builtin.assert:
        that:
          - agent_skill_definitions.matched > 0
        fail_msg: >-
          expected at least one SKILL.md under {{ agent_skills_dir }};
          got {{ agent_skill_definitions.matched | default(0) }}

    - name: Stat excluded agent skills git metadata
      ansible.builtin.stat:
        path: "{{ agent_skills_dir }}/.git"
      register: agent_skills_git_stat

    - name: Assert synced agent skills exclude git metadata
      ansible.builtin.assert:
        that:
          - not agent_skills_git_stat.stat.exists
        fail_msg: "expected {{ agent_skills_dir }}/.git to be absent"

    - name: Verify Node.js responds in cursor login shell
      ansible.builtin.shell: |
        set -euo pipefail
        {{ agent_shell }} -lic 'node --version'
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Verify npm responds in cursor login shell
      ansible.builtin.shell: |
        set -euo pipefail
        {{ agent_shell }} -lic 'npm --version'
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Verify Task responds in cursor login shell
      ansible.builtin.shell: |
        set -euo pipefail
        {{ agent_shell }} -lic 'task --version'
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Verify fish responds
      ansible.builtin.command:
        argv:
          - fish
          - --version
      changed_when: false

    - name: Verify fish config loads for cursor
      ansible.builtin.shell: |
        set -euo pipefail
        fish -i -c 'functions -q fish_prompt; printf "__FISH_CONFIG_OK__\n"'
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      register: cursor_fish_config
      changed_when: false
      failed_when: "'__FISH_CONFIG_OK__' not in cursor_fish_config.stdout"

    - name: Verify scc responds
      ansible.builtin.command:
        argv:
          - scc
          - --version
      changed_when: false
