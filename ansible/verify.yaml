- name: Verify self-hosted agent VPS
  hosts: vps
  become: true
  gather_facts: true
  tasks:
    - name: Assert CPU architecture is supported
      ansible.builtin.assert:
        that:
          - agent_detected_arch in agent_arch_map
          - agent_scc_arch in ['arm64', 'x86_64']
          - agent_rtk_arch in ['aarch64', 'x86_64']
        fail_msg: >-
          unsupported CPU architecture {{ agent_detected_arch | default('unknown') }};
          supported architectures are {{ agent_arch_map.keys() | list | join(', ') }}

    - name: Collect package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Assert base packages are installed
      ansible.builtin.assert:
        that:
          - ansible_facts['packages'][item] is defined
        fail_msg: "expected package {{ item }} to be installed"
      loop: "{{ agent_packages + ['fish', 'ufw'] }}"

    - name: Assert conflicting system packages are absent
      ansible.builtin.assert:
        that:
          - ansible_facts['packages'][item] is not defined
        fail_msg: "expected package {{ item }} to be absent"
      loop: "{{ uninstall_packages }}"

    - name: Verify agent user exists
      ansible.builtin.command:
        argv:
          - id
          - -u
          - "{{ agent_user }}"
      changed_when: false

    - name: Read agent passwd entry
      ansible.builtin.command:
        argv:
          - getent
          - passwd
          - "{{ agent_user }}"
      register: agent_passwd_entry
      changed_when: false

    - name: Verify agent login shell is fish
      ansible.builtin.assert:
        that:
          - agent_passwd_entry.stdout.endswith(':' ~ agent_shell)
        fail_msg: "expected {{ agent_user }} login shell to be {{ agent_shell }}, got {{ agent_passwd_entry.stdout }}"

    - name: Verify agent home exists
      ansible.builtin.command:
        argv:
          - test
          - -d
          - "{{ agent_home }}"
      changed_when: false

    - name: Verify agent workspace root exists
      ansible.builtin.command:
        argv:
          - test
          - -d
          - "{{ agent_workspace_root }}"
      changed_when: false

    - name: Verify ufw is installed
      ansible.builtin.command:
        argv:
          - ufw
          - --version
      changed_when: false

    - name: Verify mosh-server is installed
      ansible.builtin.command:
        argv:
          - mosh-server
          - --version
      changed_when: false

    - name: Verify make responds
      ansible.builtin.command:
        argv:
          - make
          - --version
      changed_when: false

    - name: Verify ffmpeg responds
      ansible.builtin.command:
        argv:
          - ffmpeg
          - -version
      changed_when: false

    - name: Verify Docker runs a minimal container as agent
      ansible.builtin.command:
        argv:
          - docker
          - run
          - --rm
          - --network=none
          - busybox:1.37.0-uclibc
          - /bin/true
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Verify Docker Compose responds
      ansible.builtin.command:
        argv:
          - docker-compose
          - --version
      changed_when: false

    - name: Stat agent swap file
      ansible.builtin.stat:
        path: "{{ agent_swap_file_path }}"
      register: agent_swap_file_stat

    - name: Assert agent swap file is provisioned
      ansible.builtin.assert:
        that:
          - agent_swap_file_stat.stat.exists
          - agent_swap_file_stat.stat.isreg
          - agent_swap_file_stat.stat.mode == '0600'
          - agent_swap_file_stat.stat.pw_name == 'root'
          - agent_swap_file_stat.stat.gr_name == 'root'
          - agent_swap_file_stat.stat.size | int >= agent_swap_file_size_bytes
        fail_msg: >-
          expected {{ agent_swap_file_path }} to be a root-owned 0600 regular
          swap file at least {{ agent_swap_file_size_bytes }} bytes;
          got exists={{ agent_swap_file_stat.stat.exists | default(false) }}
          mode={{ agent_swap_file_stat.stat.mode | default('missing') }}
          owner={{ agent_swap_file_stat.stat.pw_name | default('missing') }}
          group={{ agent_swap_file_stat.stat.gr_name | default('missing') }}
          size={{ agent_swap_file_stat.stat.size | default('missing') }}

    - name: Read active swap files
      ansible.builtin.command:
        argv:
          - swapon
          - --noheadings
          - --show=NAME
      register: agent_active_swap_files
      changed_when: false

    - name: Assert agent swap file is active
      ansible.builtin.assert:
        that:
          - agent_swap_file_path in agent_active_swap_files.stdout_lines
        fail_msg: >-
          expected {{ agent_swap_file_path }} in active swap files;
          got {{ agent_active_swap_files.stdout_lines | default([]) }}

    - name: Verify Java responds
      ansible.builtin.command:
        argv:
          - java
          - -version
      changed_when: false

    - name: Verify Playwright can install Chromium
      ansible.builtin.command:
        argv:
          - bun
          - x
          - --bun
          - playwright
          - install
          - chromium
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
        PATH: "{{ agent_path }}"
      changed_when: false

    - name: Read ufw default incoming policy
      ansible.builtin.command:
        argv:
          - awk
          - -F=
          - /^DEFAULT_INPUT_POLICY=/{gsub(/"/, "", $2); print $2}
          - /etc/default/ufw
      register: ufw_default_input_policy
      changed_when: false

    - name: Assert ufw default incoming policy drops traffic
      ansible.builtin.assert:
        that:
          - ufw_default_input_policy.stdout == 'DROP'
        fail_msg: >-
          expected DEFAULT_INPUT_POLICY=DROP;
          got {{ ufw_default_input_policy.stdout | default('missing') }}

    - name: Read ufw default outgoing policy
      ansible.builtin.command:
        argv:
          - awk
          - -F=
          - /^DEFAULT_OUTPUT_POLICY=/{gsub(/"/, "", $2); print $2}
          - /etc/default/ufw
      register: ufw_default_output_policy
      changed_when: false

    - name: Assert ufw default outgoing policy accepts traffic
      ansible.builtin.assert:
        that:
          - ufw_default_output_policy.stdout == 'ACCEPT'
        fail_msg: >-
          expected DEFAULT_OUTPUT_POLICY=ACCEPT;
          got {{ ufw_default_output_policy.stdout | default('missing') }}

    - name: Read ufw status
      ansible.builtin.command:
        argv:
          - ufw
          - status
      register: ufw_status
      changed_when: false

    - name: Assert ufw policy is active
      ansible.builtin.assert:
        that:
          - "'Status: active' in ufw_status.stdout"
          - "'22/tcp' in ufw_status.stdout"
          - "'60000:61000/udp' in ufw_status.stdout"
        fail_msg: >-
          expected active ufw with SSH and Mosh UDP rules;
          got {{ ufw_status.stdout_lines | default([]) }}

    - name: Read AppArmor unprivileged unconfined restriction
      ansible.builtin.command:
        argv:
          - sysctl
          - -n
          - kernel.apparmor_restrict_unprivileged_unconfined
      register: apparmor_restrict_unprivileged_unconfined
      changed_when: false

    - name: Assert AppArmor unprivileged unconfined restriction disabled
      ansible.builtin.assert:
        that:
          - apparmor_restrict_unprivileged_unconfined.stdout == '0'
        fail_msg: >-
          expected kernel.apparmor_restrict_unprivileged_unconfined=0;
          got {{ apparmor_restrict_unprivileged_unconfined.stdout | default('missing') }}

    - name: Read AppArmor unprivileged user namespace restriction
      ansible.builtin.command:
        argv:
          - sysctl
          - -n
          - kernel.apparmor_restrict_unprivileged_userns
      register: apparmor_restrict_unprivileged_userns
      changed_when: false

    - name: Assert AppArmor unprivileged user namespace restriction disabled
      ansible.builtin.assert:
        that:
          - apparmor_restrict_unprivileged_userns.stdout == '0'
        fail_msg: >-
          expected kernel.apparmor_restrict_unprivileged_userns=0;
          got {{ apparmor_restrict_unprivileged_userns.stdout | default('missing') }}

    - name: Read VM overcommit memory setting
      ansible.builtin.command:
        argv:
          - cat
          - /proc/sys/vm/overcommit_memory
      register: vm_overcommit_memory
      changed_when: false

    - name: Assert VM overcommit memory is enabled
      ansible.builtin.assert:
        that:
          - vm_overcommit_memory.stdout == '1'
        fail_msg: >-
          expected /proc/sys/vm/overcommit_memory=1;
          got {{ vm_overcommit_memory.stdout | default('missing') }}

    - name: Read VM swappiness setting
      ansible.builtin.command:
        argv:
          - sysctl
          - -n
          - vm.swappiness
      register: vm_swappiness
      changed_when: false

    - name: Assert VM swappiness is configured
      ansible.builtin.assert:
        that:
          - vm_swappiness.stdout == agent_swappiness | string
        fail_msg: >-
          expected vm.swappiness={{ agent_swappiness }};
          got {{ vm_swappiness.stdout | default('missing') }}

    - name: Verify agent can create user namespaces
      ansible.builtin.command:
        argv:
          - unshare
          - -Ur
          - "true"
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Stat agent authorized keys
      ansible.builtin.stat:
        path: "{{ agent_authorized_keys_path }}"
      register: agent_authorized_keys_stat

    - name: Assert agent authorized keys permissions
      ansible.builtin.assert:
        that:
          - agent_authorized_keys_stat.stat.exists
          - agent_authorized_keys_stat.stat.isreg
          - agent_authorized_keys_stat.stat.mode == '0600'
          - agent_authorized_keys_stat.stat.pw_name == agent_user
          - agent_authorized_keys_stat.stat.size > 0
        fail_msg: >-
          expected {{ agent_authorized_keys_path }} to exist as a non-empty regular file
          0600 owned by {{ agent_user }};
          got exists={{ agent_authorized_keys_stat.stat.exists | default(false) }}
          mode={{ agent_authorized_keys_stat.stat.mode | default('missing') }}
          owner={{ agent_authorized_keys_stat.stat.pw_name | default('missing') }}
          size={{ agent_authorized_keys_stat.stat.size | default('missing') }}

    - name: Find synced SSH private keys
      ansible.builtin.find:
        paths: "{{ agent_ssh_dir }}"
        patterns: "*"
        excludes:
          - "*.pub"
          - config
          - known_hosts*
          - authorized_keys
        file_type: file
      register: agent_synced_private_keys

    - name: Assert synced SSH private key permissions
      ansible.builtin.assert:
        that:
          - item.mode == '0600'
          - item.pw_name == agent_user
        fail_msg: >-
          expected {{ item.path }} to be 0600 owned by {{ agent_user }};
          got mode={{ item.mode | default('missing') }} owner={{ item.pw_name | default('missing') }}
      loop: "{{ agent_synced_private_keys.files }}"

    - name: Stat agent SSH config
      ansible.builtin.stat:
        path: "{{ agent_ssh_config_path }}"
      register: agent_ssh_config_stat

    - name: Assert agent SSH config permissions
      ansible.builtin.assert:
        that:
          - agent_ssh_config_stat.stat.exists
          - agent_ssh_config_stat.stat.isreg
          - agent_ssh_config_stat.stat.mode == '0600'
          - agent_ssh_config_stat.stat.pw_name == agent_user
        fail_msg: >-
          expected {{ agent_ssh_config_path }} to exist as a regular file
          0600 owned by {{ agent_user }};
          got exists={{ agent_ssh_config_stat.stat.exists | default(false) }}
          mode={{ agent_ssh_config_stat.stat.mode | default('missing') }}
          owner={{ agent_ssh_config_stat.stat.pw_name | default('missing') }}

    - name: Read GitHub SSH config for agent
      ansible.builtin.command:
        argv:
          - ssh
          - -G
          - github.com
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      register: agent_github_ssh_config
      changed_when: false

    - name: Assert GitHub SSH config uses synced identity
      ansible.builtin.assert:
        that:
          - "'user git' in agent_github_ssh_config.stdout_lines"
          - "'identitiesonly yes' in agent_github_ssh_config.stdout_lines"
          - >-
            agent_github_ssh_config.stdout_lines
            | select('match', '^identityfile (' ~ agent_ssh_dir ~ '/|~/.ssh/)')
            | list
            | length > 0
        fail_msg: >-
          expected GitHub SSH config for {{ agent_user }} to use synced
          private keys under {{ agent_ssh_dir }};
          got {{ agent_github_ssh_config.stdout_lines | default([]) }}

    - name: Verify listenbox2 is readable over GitHub SSH
      ansible.builtin.command:
        argv:
          - git
          - ls-remote
          - git@github.com:listenbox/listenbox2.git
          - HEAD
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Find synced SSH public keys
      ansible.builtin.find:
        paths: "{{ agent_ssh_dir }}"
        patterns: "*.pub"
        file_type: file
      register: agent_synced_public_keys

    - name: Assert SSH public keys were synced
      ansible.builtin.assert:
        that:
          - agent_synced_public_keys.matched > 0
        fail_msg: "expected at least one public key under {{ agent_ssh_dir }}"

    - name: Stat synced Git config
      ansible.builtin.stat:
        path: "{{ agent_gitconfig_path }}"
      register: agent_gitconfig_stat

    - name: Assert synced Git config is managed
      ansible.builtin.assert:
        that:
          - agent_gitconfig_stat.stat.exists
          - agent_gitconfig_stat.stat.isreg
          - agent_gitconfig_stat.stat.pw_name == agent_user
          - agent_gitconfig_stat.stat.mode == '0644'
          - agent_gitconfig_stat.stat.size > 0
        fail_msg: >-
          expected {{ agent_gitconfig_path }} to exist as a non-empty regular file
          0644 owned by {{ agent_user }};
          got exists={{ agent_gitconfig_stat.stat.exists | default(false) }}
          mode={{ agent_gitconfig_stat.stat.mode | default('missing') }}
          owner={{ agent_gitconfig_stat.stat.pw_name | default('missing') }}
          size={{ agent_gitconfig_stat.stat.size | default('missing') }}

    - name: Verify Git can create commits with global identity
      ansible.builtin.shell: |
        set -eu
        repo="$(mktemp -d "{{ agent_home }}/.git-identity-verify.XXXXXX")"
        trap 'rm -rf "$repo"' EXIT
        cd "$repo"
        git init --quiet
        printf 'ok\n' > smoke.txt
        git add smoke.txt
        git commit --quiet -m "Verify Git identity"
      args:
        executable: /bin/sh
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Validate sshd configuration
      ansible.builtin.command:
        argv:
          - sshd
          - -t
      changed_when: false

    - name: Read effective sshd configuration
      ansible.builtin.command:
        argv:
          - sshd
          - -T
      register: sshd_effective_config
      changed_when: false

    - name: Assert sshd hardening is effective
      ansible.builtin.assert:
        that:
          - "'passwordauthentication no' in sshd_effective_config.stdout_lines"
          - "'kbdinteractiveauthentication no' in sshd_effective_config.stdout_lines"
          - "'pubkeyauthentication yes' in sshd_effective_config.stdout_lines"
          - "'authenticationmethods publickey' in sshd_effective_config.stdout_lines"
          - >-
            'permitrootlogin prohibit-password' in sshd_effective_config.stdout_lines or
            'permitrootlogin without-password' in sshd_effective_config.stdout_lines
          - "'maxauthtries 3' in sshd_effective_config.stdout_lines"
          - "'logingracetime 20' in sshd_effective_config.stdout_lines"
        fail_msg: >-
          expected sshd effective config to enforce key-only hardening;
          got {{ sshd_effective_config.stdout_lines | default([]) }}

    - name: Verify ssh.service status
      ansible.builtin.command:
        argv:
          - systemctl
          - status
          - ssh.service
          - --no-pager
      changed_when: false

    - name: Verify Ghostty terminfo is installed
      ansible.builtin.command:
        argv:
          - infocmp
          - -A
          - /usr/share/terminfo
          - -x
          - xterm-ghostty
      changed_when: false

    - name: Verify tmux 256-color terminfo is installed
      ansible.builtin.command:
        argv:
          - infocmp
          - tmux-256color
      changed_when: false

    - name: Verify tmux wrapper is first on PATH
      ansible.builtin.command:
        argv:
          - which
          - tmux
      register: tmux_command_path
      changed_when: false

    - name: Assert tmux wrapper path
      ansible.builtin.assert:
        that:
          - tmux_command_path.stdout == '/usr/local/bin/tmux'
        fail_msg: "expected tmux wrapper at /usr/local/bin/tmux, got {{ tmux_command_path.stdout }}"

    - name: Verify tmux starts when TERM is unset
      ansible.builtin.command:
        argv:
          - script
          - -q
          - -e
          - -c
          - env -u TERM tmux -L vps-agent-term-verify new-session -s vps-agent-term-verify true
          - /dev/null
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Stat agent tmux config
      ansible.builtin.stat:
        path: "{{ agent_home }}/.tmux.conf"
      register: agent_tmux_config_stat

    - name: Assert agent tmux config is not empty
      ansible.builtin.assert:
        that:
          - agent_tmux_config_stat.stat.exists
          - agent_tmux_config_stat.stat.isreg
          - agent_tmux_config_stat.stat.pw_name == agent_user
          - agent_tmux_config_stat.stat.gr_name == agent_group
          - agent_tmux_config_stat.stat.size > 0
        fail_msg: "expected nonempty agent tmux config at {{ agent_home }}/.tmux.conf"

    - name: Verify agent tmux modified-key and hyperlink settings
      ansible.builtin.shell: |
        tmux -L vps-agent-key-verify -f "{{ agent_home }}/.tmux.conf" \
          start-server \; \
          show-options -g default-terminal \; \
          show-options -s -g extended-keys \; \
          show-options -g terminal-features \; \
          list-keys -T root S-Enter \; \
          kill-server
      args:
        executable: /bin/sh
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      register: agent_tmux_key_config
      changed_when: false

    - name: Assert agent tmux modified-key and hyperlink settings
      ansible.builtin.assert:
        that:
          - "'default-terminal tmux-256color' in agent_tmux_key_config.stdout_lines"
          - "'extended-keys always' in agent_tmux_key_config.stdout_lines"
          - agent_tmux_key_config.stdout is search('xterm-ghostty:extkeys:hyperlinks')
          - agent_tmux_key_config.stdout is search('S-Enter')
          - agent_tmux_key_config.stdout is search('send-keys Escape')
        fail_msg: >-
          expected tmux config to preserve Shift+Enter via extended keys
          and advertise OSC 8 hyperlinks;
          got {{ agent_tmux_key_config.stdout_lines | default([]) }}

    - name: Read gh auth status
      ansible.builtin.command:
        argv:
          - gh
          - auth
          - status
          - --hostname
          - github.com
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
        GH_CONFIG_DIR: "{{ agent_gh_config_dir }}"
      register: gh_auth_status
      changed_when: false
      failed_when: false

    - name: Verify Codex binary responds
      ansible.builtin.command:
        argv:
          - "{{ agent_codex_binary_name }}"
          - --version
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
        PATH: "{{ agent_path }}"
      changed_when: false

    - name: Read Codex auth status
      ansible.builtin.command:
        argv:
          - "{{ agent_codex_binary_name }}"
          - login
          - status
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
        PATH: "{{ agent_path }}"
      register: codex_auth_status
      changed_when: false
      failed_when: false

    - name: Verify Bun responds in agent login shell
      ansible.builtin.shell: |
        set -euo pipefail
        {{ agent_shell }} -lic 'bun --version'
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Verify uv responds in agent login shell
      ansible.builtin.shell: |
        set -euo pipefail
        {{ agent_shell }} -lic 'uv --version'
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Verify Task responds in agent login shell
      ansible.builtin.shell: |
        set -euo pipefail
        {{ agent_shell }} -lic 'task --version'
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Verify rtk responds in agent login shell
      ansible.builtin.shell: |
        set -euo pipefail
        {{ agent_shell }} -lic 'rtk --version'
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Verify mise responds in agent login shell
      ansible.builtin.shell: |
        set -euo pipefail
        {{ agent_shell }} -lic 'mise --version'
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Verify Omnara binary is on PATH in agent login shell
      ansible.builtin.shell: |
        set -euo pipefail
        {{ agent_shell }} -lic 'command -v omnara'
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Read Omnara auth status
      ansible.builtin.command:
        argv:
          - "{{ agent_omnara_binary_name }}"
          - auth
          - status
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
        PATH: "{{ agent_path }}"
      register: omnara_auth_status
      changed_when: false
      failed_when: false

    - name: Verify Nub responds in agent login shell
      ansible.builtin.shell: |
        set -euo pipefail
        {{ agent_shell }} -lic 'nub --version'
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Verify Codex is on PATH in agent fish login shell
      ansible.builtin.shell: |
        set -euo pipefail
        {{ agent_shell }} -lic '
          test (whoami) = "{{ agent_user }}"
          command -v bun
          command -v uv
          command -v task
          command -v rtk
          command -v mise
          command -v codex
          command -v omnara
          command -v nub
          codex --version
          test -d "{{ agent_workspace_root }}"
        '
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      changed_when: false

    - name: Stat Codex config
      ansible.builtin.stat:
        path: "{{ agent_codex_config_path }}"
      register: codex_config_stat

    - name: Assert Codex config exists
      ansible.builtin.assert:
        that:
          - codex_config_stat.stat.exists
          - codex_config_stat.stat.isreg
          - codex_config_stat.stat.pw_name == agent_user
          - codex_config_stat.stat.size > 0
        fail_msg: >-
          expected {{ agent_codex_config_path }} to exist as a non-empty regular file
          owned by {{ agent_user }};
          got exists={{ codex_config_stat.stat.exists | default(false) }}
          mode={{ codex_config_stat.stat.mode | default('missing') }}
          owner={{ codex_config_stat.stat.pw_name | default('missing') }}
          size={{ codex_config_stat.stat.size | default('missing') }}

    - name: Read Codex config
      ansible.builtin.slurp:
        src: "{{ agent_codex_config_path }}"
      register: codex_config_content

    - name: Assert managed Codex plugin config is present
      ansible.builtin.assert:
        that:
          - "'[marketplaces.caveman-repo]' in (codex_config_content.content | b64decode)"
          - '''[plugins."caveman@caveman-repo"]'' in (codex_config_content.content | b64decode)'
          - "'[marketplaces.local-plugins]' in (codex_config_content.content | b64decode)"
          - '''source = "'' ~ agent_codex_dir ~ ''"'' in (codex_config_content.content | b64decode)'
          - '''[plugins."code-review-graph@local-plugins"]'' in (codex_config_content.content | b64decode)'
        fail_msg: "expected managed caveman and local plugin blocks in {{ agent_codex_config_path }}"

    - name: Stat Codex hooks
      ansible.builtin.stat:
        path: "{{ agent_codex_dir }}/hooks.json"
      register: codex_hooks_stat

    - name: Assert Codex hooks are managed
      ansible.builtin.assert:
        that:
          - codex_hooks_stat.stat.exists
          - codex_hooks_stat.stat.isreg
          - codex_hooks_stat.stat.pw_name == agent_user
          - codex_hooks_stat.stat.mode == '0644'
          - codex_hooks_stat.stat.size > 0
        fail_msg: >-
          expected {{ agent_codex_dir }}/hooks.json to exist as a non-empty regular file
          0644 owned by {{ agent_user }};
          got exists={{ codex_hooks_stat.stat.exists | default(false) }}
          mode={{ codex_hooks_stat.stat.mode | default('missing') }}
          owner={{ codex_hooks_stat.stat.pw_name | default('missing') }}
          size={{ codex_hooks_stat.stat.size | default('missing') }}

    - name: Stat synced Codex agents override
      ansible.builtin.stat:
        path: "{{ agent_codex_agents_override_path }}"
      register: codex_agents_override_stat

    - name: Assert synced Codex agents override is managed
      ansible.builtin.assert:
        that:
          - codex_agents_override_stat.stat.exists
          - codex_agents_override_stat.stat.isreg
          - codex_agents_override_stat.stat.pw_name == agent_user
          - codex_agents_override_stat.stat.mode == '0644'
          - codex_agents_override_stat.stat.size > 0
        fail_msg: >-
          expected {{ agent_codex_agents_override_path }} to exist as a non-empty regular file
          0644 owned by {{ agent_user }};
          got exists={{ codex_agents_override_stat.stat.exists | default(false) }}
          mode={{ codex_agents_override_stat.stat.mode | default('missing') }}
          owner={{ codex_agents_override_stat.stat.pw_name | default('missing') }}
          size={{ codex_agents_override_stat.stat.size | default('missing') }}

    - name: Stat synced Codex skills directory
      ansible.builtin.stat:
        path: "{{ agent_codex_skills_dir }}"
      register: codex_skills_dir_stat

    - name: Assert synced Codex skills directory is managed
      ansible.builtin.assert:
        that:
          - codex_skills_dir_stat.stat.exists
          - codex_skills_dir_stat.stat.isdir
          - codex_skills_dir_stat.stat.pw_name == agent_user
          - codex_skills_dir_stat.stat.mode == '0755'
        fail_msg: >-
          expected {{ agent_codex_skills_dir }} to exist as a directory
          0755 owned by {{ agent_user }};
          got exists={{ codex_skills_dir_stat.stat.exists | default(false) }}
          mode={{ codex_skills_dir_stat.stat.mode | default('missing') }}
          owner={{ codex_skills_dir_stat.stat.pw_name | default('missing') }}

    - name: Find synced Codex skill definitions
      ansible.builtin.find:
        paths: "{{ agent_codex_skills_dir }}"
        patterns: SKILL.md
        recurse: true
        file_type: file
      register: codex_skill_definitions

    - name: Assert synced Codex skills contain skill definitions
      ansible.builtin.assert:
        that:
          - codex_skill_definitions.matched > 0
        fail_msg: >-
          expected at least one SKILL.md under {{ agent_codex_skills_dir }};
          got {{ codex_skill_definitions.matched | default(0) }}

    - name: Stat synced Codex plugins directory
      ansible.builtin.stat:
        path: "{{ agent_codex_plugins_dir }}"
      register: codex_plugins_dir_stat

    - name: Assert synced Codex plugins directory is managed
      ansible.builtin.assert:
        that:
          - codex_plugins_dir_stat.stat.exists
          - codex_plugins_dir_stat.stat.isdir
          - codex_plugins_dir_stat.stat.pw_name == agent_user
          - codex_plugins_dir_stat.stat.mode == '0755'
        fail_msg: >-
          expected {{ agent_codex_plugins_dir }} to exist as a directory
          0755 owned by {{ agent_user }};
          got exists={{ codex_plugins_dir_stat.stat.exists | default(false) }}
          mode={{ codex_plugins_dir_stat.stat.mode | default('missing') }}
          owner={{ codex_plugins_dir_stat.stat.pw_name | default('missing') }}

    - name: Find synced Codex plugin definitions
      ansible.builtin.find:
        paths: "{{ agent_codex_plugins_dir }}"
        patterns: .codex-plugin
        recurse: true
        hidden: true
        file_type: directory
      register: codex_plugin_definitions

    - name: Assert synced Codex plugins contain plugin definitions
      ansible.builtin.assert:
        that:
          - codex_plugin_definitions.matched > 0
        fail_msg: >-
          expected at least one .codex-plugin directory under {{ agent_codex_plugins_dir }};
          got {{ codex_plugin_definitions.matched | default(0) }}

    - name: Assert excluded Codex plugin paths are absent
      ansible.builtin.stat:
        path: "{{ agent_codex_plugins_dir }}/{{ item }}"
      loop:
        - cache
        - .plugin-appserver
        - .remote-plugin-install-staging
        - .DS_Store
      register: codex_excluded_plugin_paths

    - name: Verify excluded Codex plugin paths are absent
      ansible.builtin.assert:
        that:
          - not item.stat.exists
        fail_msg: "expected {{ agent_codex_plugins_dir }}/{{ item.item }} to be absent"
      loop: "{{ codex_excluded_plugin_paths.results }}"

    - name: Verify Codex config and hooks load
      ansible.builtin.command:
        argv:
          - "{{ agent_codex_binary_name }}"
          - debug
          - prompt-input
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
        PATH: "{{ agent_path }}"
      changed_when: false

    - name: Remove Codex smoke plugin cache paths
      ansible.builtin.file:
        path: "{{ agent_codex_plugins_dir }}/{{ item }}"
        state: absent
      loop:
        - cache
        - .plugin-appserver
        - .remote-plugin-install-staging
        - .DS_Store
      changed_when: false

    - name: Verify fish responds
      ansible.builtin.command:
        argv:
          - fish
          - --version
      changed_when: false

    - name: Stat excluded fish config paths
      ansible.builtin.stat:
        path: "{{ agent_fish_config_dir }}/{{ item }}"
      loop:
        - completions
        - conf.d/orbstack.fish
        - conf.d/rustup.fish
      register: agent_excluded_fish_config_paths

    - name: Assert excluded fish config paths are absent
      ansible.builtin.assert:
        that:
          - not item.stat.exists
        fail_msg: "expected {{ agent_fish_config_dir }}/{{ item.item }} to be absent"
      loop: "{{ agent_excluded_fish_config_paths.results }}"

    - name: Stat synced fish config
      ansible.builtin.stat:
        path: "{{ agent_fish_config_dir }}/config.fish"
      register: agent_fish_config_stat

    - name: Read synced fish config
      ansible.builtin.slurp:
        src: "{{ agent_fish_config_dir }}/config.fish"
      register: agent_fish_config_content
      when: agent_fish_config_stat.stat.exists

    - name: Assert synced fish config matches controller config
      ansible.builtin.assert:
        that:
          - agent_fish_config_stat.stat.exists
          - agent_fish_config_stat.stat.isreg
          - agent_fish_config_stat.stat.pw_name == agent_user
          - agent_fish_config_stat.stat.gr_name == agent_group
          - >-
            (agent_fish_config_content.content | default('') | b64decode | hash('sha256'))
            == (lookup('ansible.builtin.file', ansible_controller_fish_config_dir ~ '/config.fish',
            rstrip=False)
            | hash('sha256'))
        fail_msg: >-
          expected {{ agent_fish_config_dir }}/config.fish to match
          {{ ansible_controller_fish_config_dir }}/config.fish

    - name: Stat generated fish environment config
      ansible.builtin.stat:
        path: "{{ agent_fish_env_config_path }}"
      register: agent_fish_env_config_stat

    - name: Assert generated fish environment config exists
      ansible.builtin.assert:
        that:
          - agent_fish_env_config_stat.stat.exists
          - agent_fish_env_config_stat.stat.isreg
          - agent_fish_env_config_stat.stat.pw_name == agent_user
          - agent_fish_env_config_stat.stat.gr_name == agent_group
        fail_msg: "expected generated fish env config at {{ agent_fish_env_config_path }}"

    - name: Read agent fish prompt color variables
      ansible.builtin.command:
        argv:
          - fish
          - -i
          - -c
          - >-
            printf '%s\n'
            $fish_color_cwd
            $fish_color_param
            $fish_color_error
            $fish_color_autosuggestion
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      register: agent_fish_color_variables
      changed_when: false

    - name: Assert agent fish prompt color variables
      ansible.builtin.assert:
        that:
          - "'green' in agent_fish_color_variables.stdout_lines"
          - "'cyan' in agent_fish_color_variables.stdout_lines"
          - "'brred' in agent_fish_color_variables.stdout_lines"
          - "'brblack' in agent_fish_color_variables.stdout_lines"
        fail_msg: >-
          expected fish prompt colors green/cyan/brred/brblack;
          got {{ agent_fish_color_variables.stdout_lines | default([]) }}

    - name: Verify fish config loads for agent
      ansible.builtin.shell: |
        set -euo pipefail
        fish -i -c 'functions -q fish_prompt; printf "__FISH_CONFIG_OK__\n"'
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ agent_user }}"
      environment:
        HOME: "{{ agent_home }}"
      register: agent_fish_config
      changed_when: false
      failed_when: "'__FISH_CONFIG_OK__' not in agent_fish_config.stdout"

    - name: Verify scc responds
      ansible.builtin.command:
        argv:
          - scc
          - --version
      changed_when: false
