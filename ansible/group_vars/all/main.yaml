agent_user: agent
agent_group: agent
agent_home: "{{ '/home/' ~ agent_user }}"
agent_shell: /usr/bin/fish
agent_workspace_root: "{{ agent_home }}/workspace"

agent_arch_map:
  aarch64: arm64
  arm64: arm64
  x86_64: x86_64
  amd64: x86_64
agent_detected_arch: "{{ ansible_facts['architecture'] | default('') }}"
agent_scc_arch: "{{ agent_arch_map[agent_detected_arch] | default('') }}"

agent_local_bin_dir: "{{ agent_home }}/.local/bin"
agent_profile_path: "{{ agent_home }}/.profile"

agent_bun_install_url: https://bun.sh/install
agent_bun_install_root: "{{ agent_home }}/.bun"
agent_bun_bin_dir: "{{ agent_bun_install_root }}/bin"
agent_bun_binary_path: "{{ agent_bun_bin_dir }}/bun"

agent_uv_install_url: https://astral.sh/uv/install.sh
agent_uv_binary_path: "{{ agent_local_bin_dir }}/uv"
agent_uv_tool_dir: "{{ agent_home }}/.local/share/uv/tools"
agent_uv_environment:
  HOME: "{{ agent_home }}"
  PATH: "{{ agent_path }}"
  UV_TOOL_BIN_DIR: "{{ agent_local_bin_dir }}"
  UV_TOOL_DIR: "{{ agent_uv_tool_dir }}"

agent_task_install_url: https://taskfile.dev/install.sh
agent_task_binary_path: "{{ agent_local_bin_dir }}/task"

agent_codex_install_url: https://chatgpt.com/codex/install.sh
agent_codex_binary_name: codex
agent_codex_binary_path: "{{ agent_local_bin_dir }}/codex"

agent_mise_install_url: https://mise.run
agent_mise_data_dir: "{{ agent_home }}/.local/share/mise"
agent_mise_shims_dir: "{{ agent_mise_data_dir }}/shims"
agent_mise_binary_path: "{{ agent_local_bin_dir }}/mise"

agent_omnara_install_url: https://omnara.com/install.sh
agent_omnara_binary_name: omnara
agent_omnara_binary_path: "{{ agent_local_bin_dir }}/omnara"

agent_path: "{{ agent_local_bin_dir }}:{{ agent_bun_bin_dir }}:{{ agent_mise_shims_dir }}:/usr/local/bin:/usr/bin:/bin"

agent_packages:
  - bash
  - bubblewrap
  - ca-certificates
  - curl
  - docker.io
  - docker-compose-v2
  - gh
  - git
  - golang-go
  - jq
  - libgbm1
  - libgtk-3-0t64
  - mosh
  - openjdk-25-jdk-headless
  - openssh-client
  - ripgrep
  - rsync
  - tmux
  - unzip

uninstall_packages:
  - nodejs
  - npm

agent_docker_compose_binary_path: /usr/libexec/docker/cli-plugins/docker-compose
agent_docker_compose_compat_path: /usr/local/bin/docker-compose

agent_scc_download_url: >-
  https://github.com/boyter/scc/releases/latest/download/scc_Linux_{{ agent_scc_arch }}.tar.gz

ansible_controller_ssh_dir: "{{ lookup('env', 'HOME') | trim }}/.ssh"
agent_ssh_dir: "{{ agent_home }}/.ssh"
agent_authorized_keys_path: "{{ agent_ssh_dir }}/authorized_keys"
agent_ssh_config_path: "{{ agent_ssh_dir }}/config"

ansible_controller_gitconfig_path: "{{ lookup('env', 'HOME') | trim }}/.gitconfig"
agent_gitconfig_path: "{{ agent_home }}/.gitconfig"

ansible_controller_fish_config_dir: "{{ lookup('env', 'HOME') | trim }}/.config/fish"
agent_fish_config_dir: "{{ agent_home }}/.config/fish"
agent_fish_env_config_path: "{{ agent_fish_config_dir }}/conf.d/agent_env.fish"

ansible_controller_codex_skills_dir: "{{ lookup('env', 'HOME') | trim }}/.codex/skills"
ansible_controller_codex_plugins_dir: "{{ lookup('env', 'HOME') | trim }}/.codex/plugins"
ansible_controller_codex_agents_override_path: "{{ lookup('env', 'HOME') | trim }}/.codex/AGENTS.override.md"
agent_codex_dir: "{{ agent_home }}/.codex"
agent_codex_config_path: "{{ agent_codex_dir }}/config.toml"
agent_codex_agents_override_path: "{{ agent_codex_dir }}/AGENTS.override.md"
agent_codex_skills_dir: "{{ agent_codex_dir }}/skills"
agent_codex_plugins_dir: "{{ agent_codex_dir }}/plugins"

agent_gh_config_dir: "{{ agent_home }}/.config/gh"

agent_codex_caveman_config_block: |
  [marketplaces.caveman-repo]
  last_updated = "2026-05-28T22:49:11Z"
  last_revision = "ef6050c5e1848b6880ff47c32ade1a608a64f85e"
  source_type = "git"
  source = "https://github.com/JuliusBrussee/caveman.git"
  ref = "v1.7.0"

  [plugins."caveman@caveman-repo"]
  enabled = true

agent_codex_local_plugins_config_block: |
  [marketplaces.local-plugins]
  source_type = "local"
  source = "{{ agent_codex_dir }}"

  [plugins."ansible@local-plugins"]
  enabled = true

  [plugins."cloudflare@local-plugins"]
  enabled = true

  [plugins."code-review-graph@local-plugins"]
  enabled = true

  [plugins."legal-review@local-plugins"]
  enabled = true

  [plugins."postgres@local-plugins"]
  enabled = true

  [plugins."terraform@local-plugins"]
  enabled = true
