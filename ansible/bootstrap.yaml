---
- name: Bootstrap VPS base packages and firewall
  hosts: vps
  become: true
  gather_facts: false
  handlers:
    - name: Reload ufw if active
      ansible.builtin.shell: |
        set -euo pipefail
        if ufw status | grep -q "^Status: active$"; then
          ufw --force reload
        fi
      args:
        executable: /bin/bash
      changed_when: false

  tasks:
    - name: Refresh apt cache and upgrade installed packages
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        upgrade: dist
        autoremove: true
        autoclean: true

    - name: Install bootstrap packages
      ansible.builtin.apt:
        name:
          - ncurses-bin
          - ufw
        state: present

    - name: Ensure Ghostty terminfo source directory exists
      ansible.builtin.file:
        path: /usr/local/share/ghostty
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install Ghostty terminfo source
      ansible.builtin.copy:
        src: files/xterm-ghostty.terminfo
        dest: /usr/local/share/ghostty/xterm-ghostty.terminfo
        owner: root
        group: root
        mode: "0644"
      register: ghostty_terminfo_source

    - name: Check whether Ghostty terminfo is already installed
      ansible.builtin.command:
        argv:
          - infocmp
          - -A
          - /usr/share/terminfo
          - -x
          - xterm-ghostty
      register: ghostty_terminfo_probe
      changed_when: false
      failed_when: false

    - name: Install Ghostty terminfo entry
      ansible.builtin.command:
        argv:
          - tic
          - -x
          - -o
          - /usr/share/terminfo
          - /usr/local/share/ghostty/xterm-ghostty.terminfo
      when: ghostty_terminfo_source.changed or ghostty_terminfo_probe.rc != 0

    - name: Deny incoming traffic by default
      ansible.builtin.lineinfile:
        path: /etc/default/ufw
        regexp: "^DEFAULT_INPUT_POLICY="
        line: 'DEFAULT_INPUT_POLICY="DROP"'
      notify: Reload ufw if active

    - name: Allow outgoing traffic by default
      ansible.builtin.lineinfile:
        path: /etc/default/ufw
        regexp: "^DEFAULT_OUTPUT_POLICY="
        line: 'DEFAULT_OUTPUT_POLICY="ACCEPT"'
      notify: Reload ufw if active

    - name: Allow SSH through ufw
      ansible.builtin.shell: |
        set -euo pipefail
        if ufw status | grep -qE '^22/tcp'; then
          exit 0
        fi
        ufw allow 22/tcp comment 'SSH'
      args:
        executable: /bin/bash
      register: ufw_allow_ssh
      changed_when: ufw_allow_ssh.stdout != ""
      notify: Reload ufw if active

    - name: Check ufw status
      ansible.builtin.command: ufw status
      register: ufw_status
      changed_when: false

    - name: Enable ufw
      ansible.builtin.command: ufw --force enable
      register: ufw_enable
      changed_when: ufw_enable.rc == 0
      when: "'Status: active' not in ufw_status.stdout"
